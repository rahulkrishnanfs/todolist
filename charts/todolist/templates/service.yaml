apiVersion: v1
kind: Service
metadata:
  name: {{ include "todolist.fullname" . }}
  labels:
    {{- include "todolist.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080 
      name: http
  selector:
    {{- include "todolist.selectorLabels" . | nindent 4 }}
